<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartGate Resident Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#27ae60">
  <style>
    body { font-family: sans-serif; background-color: #121212; color: #ffffff; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 400px; background: #1e1e1e; border-radius: 16px; padding: 24px; box-shadow: 0 8px 24px rgba(0,0,0,0.6); box-sizing: border-box; margin-top: 40px; }
    h2 { margin-top: 0; color: #27ae60; font-size: 22px; text-align: center; }
    .status-box { background: #2a2a2a; padding: 12px; border-radius: 8px; font-size: 14px; color: #b3b3b3; margin-bottom: 20px; text-align: center; font-weight: bold; }
    button.activate-btn { background-color: #27ae60; color: white; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 20px; }
    .visitor-card { background: #2d2d2d; border-left: 5px solid #f39c12; border-radius: 8px; padding: 16px; margin-bottom: 12px; text-align: left; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
    .visitor-info { font-size: 15px; margin-bottom: 12px; line-height: 1.4; }
    .visitor-info strong { color: #f39c12; }
    .action-btn { background: #27ae60; color: white; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; }
    .action-btn:active { background: #219653; }
  </style>
</head>
<body>
  <div class="container">
    <h2>SmartGate Intercom</h2>
    <button id="activate-audio-btn" class="activate-btn">Activate Intercom Receiver</button>
    <div id="status-display" class="status-box">Status: Offline</div>
    <div id="visitor-list"></div>
  </div>
  <script src="app.js"></script>
</body>
</html>
