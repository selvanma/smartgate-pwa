<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>SmartGate Resident Portal</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#27ae60">
  <style>
    body { font-family: sans-serif; background-color: #121212; color: #ffffff; text-align: center; margin: 0; padding: 20px; }
    .container { max-width: 400px; margin: 400px auto 0; padding: 20px; background: #1e1e1e; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
    button { background-color: #27ae60; color: white; border: none; padding: 12px 24px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; transition: background 0.2s; }
    button:hover { background-color: #219653; }
    .status-box { margin-top: 20px; font-size: 14px; color: #b3b3b3; }
  </style>
</head>
<body>
  <div class="container">
    <h2>SmartGate Intercom Portal</h2>
    <p>Tap below to activate secure device microphone/audio hardware authorization channels:</p>
    <button id="activate-audio-btn">Activate Intercom Receiver</button>
    <div id="status-display" class="status-box">Status: Idle & Monitoring...</div>
  </div>
  <script src="app.js"></script>
</body>
</html>
